<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>VALOBOIS – Compte</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <main class="auth-main">
        <p class="auth-back">
            <a href="index.html">← Retour à l'évaluation</a>
        </p>

        <div class="card auth-card">
            <h1 class="auth-title">Compte VALOBOIS</h1>

            <p id="authConfigHint" class="auth-config-hint" hidden>
                La configuration Firebase n’est pas renseignée. Éditez
                <code>js/config/firebase-config.js</code>.
            </p>

            <p id="authError" class="auth-error" role="alert" hidden></p>

            <div id="authLoggedInPanel" class="auth-logged-in hidden" role="status">
                <p class="auth-logged-in-text">Connecté en tant que <strong id="authLoggedInEmail"></strong>.</p>
                <div class="auth-logged-in-actions">
                    <a class="btn btn-secondary" href="index.html">Ouvrir l'outil</a>
                    <button type="button" class="btn btn-primary" id="btnSignOut">Se déconnecter</button>
                </div>
            </div>

            <div id="authFormsBlock">
                <div class="auth-tabs" role="tablist" aria-label="Mode de connexion">
                    <button type="button" class="auth-tab" id="tabSignIn" role="tab" aria-selected="true"
                        aria-controls="panelSignIn">Connexion</button>
                    <button type="button" class="auth-tab" id="tabSignUp" role="tab" aria-selected="false"
                        aria-controls="panelSignUp">Créer un compte</button>
                </div>

                <div id="panelSignIn" class="auth-panel" role="tabpanel" aria-labelledby="tabSignIn">
                    <form id="formSignIn" class="auth-form" autocomplete="on">
                        <label class="auth-label" for="signInEmail">E-mail</label>
                        <input class="auth-input" type="email" id="signInEmail" name="email" required
                            autocomplete="username" inputmode="email">

                        <label class="auth-label" for="signInPassword">Mot de passe</label>
                        <input class="auth-input" type="password" id="signInPassword" name="password" required
                            autocomplete="current-password">

                        <button type="submit" class="btn btn-primary btn-full auth-submit">Se connecter</button>
                    </form>
                </div>

                <div id="panelSignUp" class="auth-panel hidden" role="tabpanel" aria-labelledby="tabSignUp">
                    <form id="formSignUp" class="auth-form" autocomplete="on">
                        <label class="auth-label" for="signUpEmail">E-mail</label>
                        <input class="auth-input" type="email" id="signUpEmail" name="email" required
                            autocomplete="username" inputmode="email">

                        <label class="auth-label" for="signUpPassword">Mot de passe</label>
                        <input class="auth-input" type="password" id="signUpPassword" name="new-password" required
                            autocomplete="new-password" minlength="6">

                        <button type="submit" class="btn btn-primary btn-full auth-submit">Créer le compte</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script defer src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
    <script defer src="js/config/firebase-config.js"></script>
    <script defer src="js/lib/firebase-app-auth.js"></script>
    <script defer src="js/app/auth-page.js"></script>
</body>

</html>
